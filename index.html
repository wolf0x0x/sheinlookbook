<script>
(function () {
  function closeLanguageMenus(except) {
    document.querySelectorAll('[data-language-menu]').forEach(function (menu) {
      if (menu !== except) menu.classList.add('hidden');
    });
  }
  window.toggleLanguageMenu = function (button) {
    var menu = button.nextElementSibling;
    var willOpen = menu.classList.contains('hidden');
    closeLanguageMenus(menu);
    menu.classList.toggle('hidden', !willOpen);
    button.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
  };

  window.applyStyleFilters = function () {
    var active = document.querySelector('[data-style-filter].bg-primary-container');
    var occasion = active ? active.getAttribute('data-style-filter') : 'all';
    var season = (document.querySelector('[data-filter-season]') || {}).value || 'all';
    var budget = (document.querySelector('[data-filter-budget]') || {}).value || 'all';
    var style = (document.querySelector('[data-filter-style]') || {}).value || 'all';
    document.querySelectorAll('[data-occasion]').forEach(function (card) {
      var show = (occasion === 'all' || card.getAttribute('data-occasion') === occasion) &&
        (season === 'all' || card.getAttribute('data-season') === season) &&
        (budget === 'all' || card.getAttribute('data-budget') === budget) &&
        (style === 'all' || card.getAttribute('data-style') === style);
      card.classList.toggle('hidden', !show);
    });
  };
  window.resetStyleFilters = function (button) {
    document.querySelectorAll('[data-style-filter]').forEach(function (btn) {
      var isAll = btn.getAttribute('data-style-filter') === 'all';
      btn.classList.toggle('bg-primary-container', isAll);
      btn.classList.toggle('text-on-primary-container', isAll);
      btn.classList.toggle('bg-surface-variant', !isAll);
      btn.classList.toggle('text-on-surface-variant', !isAll);
    });
    document.querySelectorAll('[data-filter-season], [data-filter-budget], [data-filter-style]').forEach(function (select) { select.value = 'all'; });
    window.applyStyleFilters();
    if (button) button.textContent = button.getAttribute('data-loaded-label') || 'All items loaded';
  };
  document.addEventListener('change', function (event) {
    if (event.target.matches('[data-filter-season], [data-filter-budget], [data-filter-style]')) window.applyStyleFilters();
  });
  document.addEventListener('click', function (event) {
    if (!event.target.closest('[data-language-switcher]')) closeLanguageMenus();
  });
  document.addEventListener('click', function (event) {
    var copyButton = event.target.closest('[data-copy-code]');
    if (copyButton) {
      var code = copyButton.getAttribute('data-copy-code');
      navigator.clipboard && navigator.clipboard.writeText(code);
      copyButton.textContent = copyButton.getAttribute('data-copied-label') || 'Copied';
      setTimeout(function () {
        copyButton.textContent = copyButton.getAttribute('data-copy-label') || code;
      }, 1600);
    }
    var filter = event.target.closest('[data-style-filter]');
    if (filter) {
      var value = filter.getAttribute('data-style-filter');
      document.querySelectorAll('[data-style-filter]').forEach(function (btn) {
        btn.classList.toggle('bg-primary-container', btn === filter);
        btn.classList.toggle('text-on-primary-container', btn === filter);
        btn.classList.toggle('bg-surface-variant', btn !== filter);
        btn.classList.toggle('text-on-surface-variant', btn !== filter);
      });
      window.applyStyleFilters();
    }
  });
  window.handleNewsletter = function (event, message) {
    event.preventDefault();
    var form = event.currentTarget;
    var input = form.querySelector('input[type="email"]');
    if (!input || !input.checkValidity()) return;
    var note = form.querySelector('[data-form-note]');
    if (!note) {
      note = document.createElement('p');
      note.setAttribute('data-form-note', '');
      note.className = 'text-xs text-primary font-bold mt-2';
      form.appendChild(note);
    }
    note.textContent = message || 'Subscription saved locally.';
    try { gtag('event', 'newsletter_submit'); } catch (e) {}
    form.reset();
  };
  window.calculateSize = function (button) {
    var panel = button.closest('section');
    var selects = panel.querySelectorAll('select');
    var input = panel.querySelector('input');
    var result = panel.querySelector('[data-size-result]');
    var range = panel.querySelector('[data-size-range]');
    var raw = (input && input.value || '').toUpperCase();
    var from = selects[0] && selects[0].value || 'CN';
    var to = selects[1] && selects[1].value || 'US';
    var size = 'M';
    if (/XS|150|32|0-2/.test(raw)) size = 'XS';
    else if (/S|155|160|34|4-6/.test(raw)) size = 'S';
    else if (/L|170|175|40|12-14/.test(raw)) size = 'L';
    else if (/XL|180|42|16/.test(raw)) size = 'XL';
    var map = {
      XS: {US:'US Size XS (0-2)', EU:'EU 32-34', CN:'CN 150/76A', UK:'UK 4-6', JP:'JP 5'},
      S: {US:'US Size S (4-6)', EU:'EU 34-36', CN:'CN 155/80A', UK:'UK 8', JP:'JP 7'},
      M: {US:'US Size M (8-10)', EU:'EU 38-40', CN:'CN 165/88A', UK:'UK 10-12', JP:'JP 9'},
      L: {US:'US Size L (12-14)', EU:'EU 42-44', CN:'CN 170/96A', UK:'UK 14-16', JP:'JP 11'},
      XL:{US:'US Size XL (16)', EU:'EU 46', CN:'CN 175/104A', UK:'UK 18', JP:'JP 13'}
    };
    if (result) result.textContent = (result.getAttribute('data-prefix') || 'Recommended: ') + (map[size][to] || map[size].US);
    if (range) {
      var bust = ({XS:'78-82cm',S:'84-88cm',M:'90-94cm',L:'96-102cm',XL:'104-110cm'}[size]);
      var prefix = result && result.getAttribute('data-prefix') || '';
      if (prefix.indexOf('推荐') === 0) range.textContent = '原标准 ' + from + ' · 胸围参考 ' + bust;
      else if (prefix.indexOf('おすすめ') === 0) range.textContent = '変換元 ' + from + ' · バスト目安 ' + bust;
      else range.textContent = 'From ' + from + ' · bust ' + bust;
    }
  };
})();
</script>
